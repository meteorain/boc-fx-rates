<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BOC FX</title>
    <link rel="stylesheet" href="./popup.css" />
  </head>
  <body>
    <header class="topbar">
      <a id="source" class="brand" target="_blank" rel="noopener">
        <span class="brand__dot"></span>
        <span class="brand__title" data-i18n="header"></span>
      </a>
      <div class="topbar__actions">
        <button id="calc" class="icon-btn" type="button" data-i18n-title="converter">
          <svg viewBox="0 0 24 24" width="16" height="16" aria-hidden="true">
            <rect
              x="5"
              y="3"
              width="14"
              height="18"
              rx="2.5"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            />
            <path
              d="M9 7.5h6"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
            />
            <path
              d="M9.5 12h0M14.5 12h0M9.5 16h0M14.5 16h0"
              stroke="currentColor"
              stroke-width="2.4"
              stroke-linecap="round"
            />
          </svg>
        </button>
        <button id="sidepanel" class="icon-btn" type="button" data-i18n-title="openSidePanel" hidden>
          <svg viewBox="0 0 24 24" width="16" height="16" aria-hidden="true">
            <rect x="3" y="4" width="18" height="16" rx="2" fill="none" stroke="currentColor" stroke-width="2" />
            <line x1="15" y1="4" x2="15" y2="20" stroke="currentColor" stroke-width="2" />
          </svg>
        </button>
        <button id="refresh" class="icon-btn" type="button" data-i18n-title="refresh">
          <svg viewBox="0 0 24 24" width="16" height="16" aria-hidden="true">
            <path
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
              d="M21 12a9 9 0 1 1-2.64-6.36M21 4v5h-5"
            />
          </svg>
        </button>
        <button id="options" class="icon-btn" type="button" data-i18n-title="settings">
          <svg viewBox="0 0 24 24" width="16" height="16" aria-hidden="true">
            <path
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
              d="M12 15.5a3.5 3.5 0 1 0 0-7 3.5 3.5 0 0 0 0 7Z"
            />
            <path
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
              d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-2.82 1.17V21a2 2 0 1 1-4 0v-.09A1.65 1.65 0 0 0 7.6 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 3 14.6H3a2 2 0 1 1 0-4h.09A1.65 1.65 0 0 0 4.6 9.4l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 6.6h.09A1.65 1.65 0 0 0 10 5V5a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 2.82 1.17l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 21 11h.09A2 2 0 1 1 21 15Z"
            />
          </svg>
        </button>
      </div>
    </header>

    <div class="meta">
      <span id="updated" class="updated"></span>
      <div id="window" class="segbar" role="group"></div>
    </div>

    <p id="notice" class="notice" hidden></p>

    <section id="converter" class="converter" aria-hidden="true">
      <div class="converter__inner">
        <div class="converter__head">
          <div id="conv-cash" class="segbar" role="group"></div>
          <div id="conv-quick" class="conv__quick"></div>
        </div>
        <div class="conv__io">
          <input
            id="conv-amount"
            class="conv__amount"
            type="number"
            inputmode="decimal"
            min="0"
            value="100"
          />
          <select id="conv-from" class="conv__cur"></select>
        </div>
        <button id="conv-swap" class="conv__swap" type="button" data-i18n-title="convSwap">
          <svg viewBox="0 0 24 24" width="15" height="15" aria-hidden="true">
            <path
              d="M7 4v13m0 0-3-3m3 3 3-3M17 20V7m0 0-3 3m3-3 3 3"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
          </svg>
        </button>
        <div class="conv__io">
          <span id="conv-out" class="conv__out"></span>
          <select id="conv-to" class="conv__cur"></select>
          <button id="conv-copy" class="conv__copy" type="button" data-i18n-title="convCopy">
            <svg viewBox="0 0 24 24" width="14" height="14" aria-hidden="true">
              <rect x="9" y="9" width="11" height="11" rx="2" fill="none" stroke="currentColor" stroke-width="2" />
              <path d="M5 15V5a2 2 0 0 1 2-2h10" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
            </svg>
          </button>
        </div>
        <p id="conv-rate" class="conv__rate"></p>
      </div>
    </section>

    <main id="list" class="list"></main>

    <section id="empty" class="empty" hidden>
      <p data-i18n="noData"></p>
      <button id="empty-refresh" class="btn" type="button" data-i18n="refresh"></button>
    </section>

    <footer id="foot" class="foot"><span data-i18n="trendNote"></span> <a class="foot__site" data-i18n="getDesktop" href="https://boc.liuweinan.com" target="_blank" rel="noopener">下载桌面版请到官网</a></footer>

    <script type="module" src="./popup.ts"></script>
  </body>
</html>

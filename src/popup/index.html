<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BOC FX</title>
    <link rel="stylesheet" href="./popup.css" />
  </head>
  <body>
    <header class="topbar">
      <a id="source" class="brand" target="_blank" rel="noopener">
        <span class="brand__dot"></span>
        <span class="brand__title" data-i18n="header"></span>
      </a>
      <div class="topbar__actions">
        <button id="refresh" class="icon-btn" type="button" data-i18n-title="refresh">
          <svg viewBox="0 0 24 24" width="16" height="16" aria-hidden="true">
            <path
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
              d="M21 12a9 9 0 1 1-2.64-6.36M21 4v5h-5"
            />
          </svg>
        </button>
        <button id="options" class="icon-btn" type="button" data-i18n-title="settings">
          <svg viewBox="0 0 24 24" width="16" height="16" aria-hidden="true">
            <path
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
              d="M12 15.5a3.5 3.5 0 1 0 0-7 3.5 3.5 0 0 0 0 7Z"
            />
            <path
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
              d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-2.82 1.17V21a2 2 0 1 1-4 0v-.09A1.65 1.65 0 0 0 7.6 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 3 14.6H3a2 2 0 1 1 0-4h.09A1.65 1.65 0 0 0 4.6 9.4l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 6.6h.09A1.65 1.65 0 0 0 10 5V5a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 2.82 1.17l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 21 11h.09A2 2 0 1 1 21 15Z"
            />
          </svg>
        </button>
      </div>
    </header>

    <div class="meta">
      <span id="updated" class="updated"></span>
      <div id="window" class="window" role="group"></div>
    </div>
    <main id="list" class="list"></main>

    <section id="empty" class="empty" hidden>
      <p data-i18n="noData"></p>
      <button id="empty-refresh" class="btn" type="button" data-i18n="refresh"></button>
    </section>

    <footer id="foot" class="foot" data-i18n="trendNote"></footer>

    <script type="module" src="./popup.ts"></script>
  </body>
</html>

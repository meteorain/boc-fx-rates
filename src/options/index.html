<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title data-i18n="optionsTitle"></title>
    <link rel="stylesheet" href="./options.css" />
  </head>
  <body>
    <div class="page">
      <header class="page__head">
        <span class="brand__dot"></span>
        <h1 data-i18n="header"></h1>
      </header>

      <section class="panel">
        <h2 data-i18n="selectCurrency"></h2>
        <p class="hint" data-i18n="selectCurrencyHint"></p>
        <input id="currency-search" class="search" type="search" autocomplete="off" />
        <div id="currency-grid" class="chip-grid"></div>
        <div id="currency-order" class="order-strip" role="list"></div>
      </section>

      <section class="panel">
        <h2 data-i18n="badgeSettings"></h2>
        <div class="field">
          <label for="badge-currency" data-i18n="badgeCurrency"></label>
          <select id="badge-currency" class="select"></select>
        </div>
        <div class="field">
          <span class="field__label" data-i18n="badgeRateType"></span>
          <div id="badge-rate-type" class="segmented"></div>
        </div>
      </section>

      <section class="panel">
        <h2 data-i18n="thresholdSettings"></h2>
        <p class="hint" data-i18n="thresholdHint"></p>
        <div id="thresholds" class="thresholds"></div>
        <p id="thresholds-empty" class="hint" data-i18n="thresholdEmpty"></p>
      </section>

      <section class="panel">
        <h2 data-i18n="smartAlerts"></h2>
        <p class="hint" data-i18n="smartAlertsHint"></p>

        <div class="alert-row">
          <div class="alert-row__main">
            <span class="alert-row__title" data-i18n="alertSummary"></span>
            <span class="alert-row__desc" data-i18n="alertSummaryDesc"></span>
          </div>
          <div class="alert-row__control">
            <input id="summary-time" class="mini-input" type="time" />
            <label class="switch">
              <input id="summary-on" type="checkbox" />
              <span class="switch__track"></span>
            </label>
          </div>
        </div>

        <div class="alert-row">
          <div class="alert-row__main">
            <span class="alert-row__title" data-i18n="alertMove"></span>
            <span class="alert-row__desc" data-i18n="alertMoveDesc"></span>
          </div>
          <div class="alert-row__control">
            <input id="move-percent" class="mini-input" type="number" min="0.1" step="0.1" />
            <span class="mini-unit">%</span>
            <label class="switch">
              <input id="move-on" type="checkbox" />
              <span class="switch__track"></span>
            </label>
          </div>
        </div>

        <div class="alert-row">
          <div class="alert-row__main">
            <span class="alert-row__title" data-i18n="alertExtreme"></span>
            <span class="alert-row__desc" data-i18n="alertExtremeDesc"></span>
          </div>
          <div class="alert-row__control">
            <select id="extreme-days" class="mini-input"></select>
            <label class="switch">
              <input id="extreme-on" type="checkbox" />
              <span class="switch__track"></span>
            </label>
          </div>
        </div>
      </section>

      <section class="panel">
        <h2 data-i18n="updateFrequency"></h2>
        <div id="frequency" class="segmented"></div>
      </section>

      <section class="panel">
        <h2 data-i18n="themeSettings"></h2>
        <div id="theme" class="segmented"></div>
      </section>

      <div class="actions">
        <button id="save" class="btn btn--primary" type="button" data-i18n="save"></button>
      </div>
    </div>

    <div id="toast" class="toast" role="status" aria-live="polite"></div>
    <script type="module" src="./options.ts"></script>
  </body>
</html>
